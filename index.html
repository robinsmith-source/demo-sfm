<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Structure from Motion Demo</title>
  <meta name="description" content="Interactive viewer for a real COLMAP sparse 3D reconstruction of the Sceaux Castle dataset." />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <canvas id="scene"></canvas>

    <!-- Loading overlay -->
    <div id="loading">
      <div class="spinner"></div>
      <p id="loading-status">Loading reconstruction…</p>
    </div>

    <!-- Heads-up display -->
    <header id="title">
      <h1 id="ds-title">Sceaux Castle</h1>
      <p id="subtitle">Structure from Motion</p>
      <select id="dataset" aria-label="Select dataset"></select>
      <p id="credit"></p>
    </header>

    <dl id="stats">
      <div class="stat"><dt>Points</dt><dd id="s-pts">—</dd></div>
      <div class="stat"><dt>Cameras</dt><dd id="s-cams">—</dd></div>
      <div class="stat"><dt>Tracks</dt><dd id="s-tracks">—</dd></div>
      <div class="stat"><dt>FPS</dt><dd id="s-fps">—</dd></div>
    </dl>

    <nav id="layers"></nav>

    <div id="filmstrip"></div>

    <!-- Lightbox -->
    <div id="lightbox" role="dialog" aria-modal="true">
      <button id="lightbox-close" aria-label="Close">✕</button>
      <img id="lb-img" src="" alt="" />
      <div id="lightbox-label"></div>
      <div id="lightbox-nav">
        <button class="lb-btn" id="lb-prev">← Prev</button>
        <button class="lb-btn" id="lb-next">Next →</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
