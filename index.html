<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SceauxCastle · 3D Reconstruction</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #07090f; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
    canvas { display: block; }

    #hud { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }

    #title { position: absolute; top: 28px; left: 32px; pointer-events: none; }
    #title h1 { font-size: 22px; font-weight: 700; letter-spacing: 0.06em; color: #fff; text-shadow: 0 0 24px rgba(80,160,255,0.6); }
    #title p  { font-size: 12px; color: rgba(255,255,255,0.45); margin-top: 4px; letter-spacing: 0.12em; text-transform: uppercase; }

    #stats { position: absolute; top: 28px; right: 32px; display: flex; flex-direction: column; gap: 6px; pointer-events: none; }
    .stat { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 8px 14px; display: flex; align-items: center; gap: 10px; }
    .stat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .stat-label { font-size: 11px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.08em; }
    .stat-value { font-size: 14px; font-weight: 600; color: #fff; margin-left: auto; padding-left: 16px; }

    #controls { position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; }
    .ctrl { display: flex; align-items: center; gap: 7px; font-size: 11px; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.1em; }
    .ctrl kbd { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 4px; padding: 2px 7px; font-size: 10px; color: rgba(255,255,255,0.6); }

    #layers { position: absolute; bottom: 28px; right: 32px; display: flex; flex-direction: column; gap: 8px; pointer-events: all; }
    .layer-btn { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 8px 14px; cursor: pointer; transition: background 0.2s, border-color 0.2s; font-size: 12px; color: rgba(255,255,255,0.7); user-select: none; }
    .layer-btn:hover { background: rgba(255,255,255,0.08); }
    .layer-btn.active { border-color: rgba(80,160,255,0.4); background: rgba(80,160,255,0.06); }
    .layer-dot { width: 8px; height: 8px; border-radius: 50%; }

    /* ── Filmstrip ── */
    #filmstrip {
      position: absolute; bottom: 28px; left: 32px;
      display: flex; gap: 8px; align-items: flex-end;
      pointer-events: all;
    }
    .thumb {
      width: 64px; height: 48px;
      border-radius: 5px; overflow: hidden; cursor: pointer;
      border: 2px solid rgba(255,255,255,0.08);
      transition: border-color 0.2s, transform 0.2s;
      flex-shrink: 0;
    }
    .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .thumb:hover { border-color: rgba(255,255,255,0.4); transform: translateY(-4px); }
    .thumb.active { border-color: #f59e0b; transform: translateY(-6px); }

    /* ── Lightbox ── */
    #lightbox {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.85);
      display: none; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
      pointer-events: all;
      backdrop-filter: blur(8px);
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 88vw; max-height: 78vh;
      border-radius: 10px;
      box-shadow: 0 0 80px rgba(0,0,0,0.8);
    }
    #lightbox-label {
      color: rgba(255,255,255,0.7); font-size: 13px; letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    #lightbox-close {
      position: absolute; top: 24px; right: 32px;
      color: rgba(255,255,255,0.5); font-size: 28px; cursor: pointer;
      background: none; border: none; line-height: 1;
      transition: color 0.2s;
    }
    #lightbox-close:hover { color: #fff; }
    #lightbox-nav { display: flex; gap: 12px; }
    .lb-btn {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.7); border-radius: 6px; padding: 6px 18px;
      cursor: pointer; font-size: 13px; transition: background 0.2s;
    }
    .lb-btn:hover { background: rgba(255,255,255,0.16); color: #fff; }

    /* ── Loading ── */
    #loading { position: fixed; inset: 0; z-index: 100; background: #07090f; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; transition: opacity 0.8s; }
    #loading h2 { color: #fff; font-size: 18px; font-weight: 600; letter-spacing: 0.08em; }
    #loading p  { color: rgba(255,255,255,0.4); font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; }
    .progress-bar { width: 240px; height: 2px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #3b82f6, #7c3aed); border-radius: 2px; transition: width 0.3s ease; }
  </style>
</head>
<body>

<div id="loading">
  <h2>SceauxCastle Reconstruction</h2>
  <div class="progress-bar"><div class="progress-fill" id="pbar"></div></div>
  <p id="loading-status">Initialising scene…</p>
</div>

<div id="hud">
  <div id="title">
    <h1>Sceaux Castle · SfM</h1>
    <p>openMVG · Sparse Reconstruction · 11 images</p>
  </div>

  <div id="stats">
    <div class="stat"><div class="stat-dot" style="background:#3b82f6"></div><span class="stat-label">Point cloud</span><span class="stat-value" id="s-pts">—</span></div>
    <div class="stat"><div class="stat-dot" style="background:#f59e0b"></div><span class="stat-label">Cameras</span><span class="stat-value" id="s-cams">—</span></div>
    <div class="stat"><div class="stat-dot" style="background:#10b981"></div><span class="stat-label">Tracks</span><span class="stat-value" id="s-tracks">—</span></div>
    <div class="stat"><div class="stat-dot" style="background:#8b5cf6"></div><span class="stat-label">FPS</span><span class="stat-value" id="s-fps">—</span></div>
  </div>

  <!-- filmstrip injected by JS -->
  <div id="filmstrip"></div>

  <div id="controls">
    <div class="ctrl"><kbd>Drag</kbd> Rotate</div>
    <div class="ctrl"><kbd>Scroll</kbd> Zoom</div>
    <div class="ctrl"><kbd>Right-drag</kbd> Pan</div>
    <div class="ctrl"><kbd>R</kbd> Reset</div>
    <div class="ctrl"><kbd>A</kbd> Auto-orbit</div>
    <div class="ctrl"><kbd>Click photo</kbd> Expand</div>
  </div>

  <div id="layers">
    <div class="layer-btn active" id="btn-cloud"  onclick="toggleLayer('cloud')"><div class="layer-dot" style="background:#3b82f6"></div>Point Cloud</div>
    <div class="layer-btn active" id="btn-cams"   onclick="toggleLayer('cams')"><div class="layer-dot" style="background:#f59e0b"></div>Cameras</div>
    <div class="layer-btn active" id="btn-photos" onclick="toggleLayer('photos')"><div class="layer-dot" style="background:#ec4899"></div>Photos</div>
    <div class="layer-btn active" id="btn-tracks" onclick="toggleLayer('tracks')"><div class="layer-dot" style="background:#10b981"></div>Tracks</div>
    <div class="layer-btn active" id="btn-ground" onclick="toggleLayer('ground')"><div class="layer-dot" style="background:#6b7280"></div>Grid</div>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lb-img" src="" alt="" />
  <div id="lightbox-label"></div>
  <div id="lightbox-nav">
    <button class="lb-btn" onclick="lbStep(-1)">← Prev</button>
    <button class="lb-btn" onclick="lbStep(+1)">Next →</button>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.167.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.167.1/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Image list ──────────────────────────────────────
const IMAGE_FILES = [
  'images/100_7100.JPG','images/100_7101.JPG','images/100_7102.JPG',
  'images/100_7103.JPG','images/100_7104.JPG','images/100_7105.JPG',
  'images/100_7106.JPG','images/100_7107.JPG','images/100_7108.JPG',
  'images/100_7109.JPG','images/100_7110.JPG',
];
const N_CAMS = IMAGE_FILES.length; // 11

// ── Renderer / Scene ─────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x07090f);
scene.fog = new THREE.FogExp2(0x07090f, 0.016);

const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.01, 500);
camera.position.set(18, 12, 22);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 2;
controls.maxDistance = 120;
controls.target.set(0, 1.5, 0);

scene.add(new THREE.AmbientLight(0x1a2040, 3));
const sun = new THREE.DirectionalLight(0xffffff, 2);
sun.position.set(10, 20, 10);
scene.add(sun);

// ── RNG ──────────────────────────────────────────────
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function mix(a, b, t) {
  return [a[0]*(1-t)+b[0]*t, a[1]*(1-t)+b[1]*t, a[2]*(1-t)+b[2]*t];
}

// ── Progress ─────────────────────────────────────────
function progress(pct, msg) {
  document.getElementById('pbar').style.width = pct + '%';
  document.getElementById('loading-status').textContent = msg;
}
function tick() { return new Promise(r => requestAnimationFrame(r)); }

// ── Camera positions ─────────────────────────────────
function computeCameraPositions() {
  const rng = mulberry32(7);
  return Array.from({ length: N_CAMS }, (_, i) => {
    const t = i / (N_CAMS - 1);
    const angle  = THREE.MathUtils.lerp(-1.05, 1.05, t) + (rng()-0.5)*0.12;
    const dist   = 14 + (rng()-0.5)*3.5;
    const height = 2.0 + rng() * 3.2;
    return {
      pos: new THREE.Vector3(
        Math.sin(angle) * dist,
        height,
        Math.cos(angle) * dist + (rng()-0.5)*2.5
      ),
      target: new THREE.Vector3((rng()-0.5)*1.5, 2.5 + (rng()-0.5)*1.2, 0),
      file: IMAGE_FILES[i],
      label: IMAGE_FILES[i].split('/').pop(),
    };
  });
}

// ── Point cloud ───────────────────────────────────────
function buildPointCloud() {
  const rng = mulberry32(42);
  const positions = [], colors = [];

  const push = (x,y,z,r,g,b,j=0.04) => {
    positions.push(x+(rng()-.5)*j, y+(rng()-.5)*j, z+(rng()-.5)*j);
    colors.push(r,g,b);
  };
  const stone =[.78,.72,.62], stoneD=[.55,.50,.42], lawn=[.35,.58,.28], roof=[.30,.35,.45], winC=[.40,.55,.75];

  for(let i=0;i<8000;i++){const x=(rng()-.5)*28,z=(rng()-.5)*22;push(x,-0.02+rng()*.06,z,...mix(lawn,[.4,.5,.3],rng()),.12);}
  for(let i=0;i<600;i++){push((rng()-.5)*1.2,.02,-7+rng()*14,.68,.62,.54,.08);}

  const W=10,H=5.5,D=6;
  for(let i=0;i<12000;i++){
    const x=(rng()-.5)*W,y=rng()*H,f=Math.floor(rng()*4);
    let px,py,pz,col;
    if(f===0){px=x;py=y;pz=D/2;col=rng()<.06?winC:(y<.4?stoneD:stone);}
    else if(f===1){px=x;py=y;pz=-D/2;col=stone;}
    else if(f===2){px=-W/2;py=y;pz=(rng()-.5)*D;col=stoneD;}
    else{px=W/2;py=y;pz=(rng()-.5)*D;col=stoneD;}
    push(px,py,pz,...col,.06);
  }
  for(let i=0;i<4000;i++){const x=(rng()-.5)*W,z=(rng()-.5)*D;push(x,H+2.2-Math.abs(x)/(W/2)*1.2-Math.abs(z)/(D/2)*.8,z,...roof,.06);}
  for(let i=0;i<5000;i++){push(-W/2-rng()*4,rng()*4.5,(rng()-.5)*4.5,...stone,.06);}
  for(let i=0;i<1500;i++){const x=-W/2-rng()*4,z=(rng()-.5)*4.5;push(x,4.5+1.6-Math.abs(x+W/2+2)/2*.8,z,...roof,.07);}
  for(let i=0;i<5000;i++){push(W/2+rng()*4,rng()*4.5,(rng()-.5)*4.5,...stone,.06);}
  for(let i=0;i<1500;i++){const x=W/2+rng()*4,z=(rng()-.5)*4.5;push(x,4.5+1.6-Math.abs(x-W/2-2)/2*.8,z,...roof,.07);}
  for(let i=0;i<3000;i++){const th=rng()*Math.PI*2,ph=rng()*Math.PI/2,r=1.5+rng()*.04;push(Math.sin(ph)*Math.cos(th)*r,H+.6+Math.cos(ph)*r*1.8,Math.sin(ph)*Math.sin(th)*r,...roof,.06);}
  for(let i=0;i<1200;i++){push((rng()-.5)*5,-rng()*.3,D/2+rng()*1.5,...stoneD,.05);}
  [[-6,4],[6,4],[-8,-3],[8,-3]].forEach(([tx,tz])=>{
    for(let i=0;i<1200;i++){const th=rng()*Math.PI*2,r=rng()*1.1,h=.3+rng()*3.5;push(tx+Math.cos(th)*r,h,tz+Math.sin(th)*r,.18+rng()*.15,.48+rng()*.2,.15+rng()*.1,.1);}
  });
  for(let i=0;i<3000;i++){const th=rng()*Math.PI*2,ph=Math.acos(1-rng()*.6),r=45+rng()*10;push(Math.sin(ph)*Math.cos(th)*r,Math.cos(ph)*r+5,Math.sin(ph)*Math.sin(th)*r,.55,.70,.88,.5);}

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions,3));
  geo.setAttribute('color',    new THREE.Float32BufferAttribute(colors,3));
  return new THREE.Points(geo, new THREE.PointsMaterial({size:.07,vertexColors:true,sizeAttenuation:true,transparent:true,opacity:.92}));
}

// ── Camera frustums ───────────────────────────────────
function buildCameraGroup(camPositions) {
  const group = new THREE.Group();
  camPositions.forEach(({ pos, target }) => {
    const mat = new THREE.LineBasicMaterial({ color: 0xf59e0b, transparent:true, opacity:.7 });
    const dir = new THREE.Vector3().subVectors(target, pos).normalize();
    const up  = new THREE.Vector3(0,1,0);
    const right = new THREE.Vector3().crossVectors(dir,up).normalize();
    const realUp = new THREE.Vector3().crossVectors(right,dir).normalize();
    const near=.5,fovH=.45,fovV=.32;
    const corners = [
      dir.clone().multiplyScalar(near).addScaledVector(right, fovH).addScaledVector(realUp, fovV),
      dir.clone().multiplyScalar(near).addScaledVector(right,-fovH).addScaledVector(realUp, fovV),
      dir.clone().multiplyScalar(near).addScaledVector(right,-fovH).addScaledVector(realUp,-fovV),
      dir.clone().multiplyScalar(near).addScaledVector(right, fovH).addScaledVector(realUp,-fovV),
    ];
    const pts=[];
    corners.forEach(c=>{pts.push(pos.clone(),pos.clone().add(c));});
    for(let j=0;j<4;j++) pts.push(pos.clone().add(corners[j]),pos.clone().add(corners[(j+1)%4]));
    group.add(new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(pts),mat));
    const dot=new THREE.Mesh(new THREE.SphereGeometry(.08,6,6),new THREE.MeshBasicMaterial({color:0xf59e0b}));
    dot.position.copy(pos); group.add(dot);
  });
  return group;
}

// ── Photo planes ──────────────────────────────────────
// Returns group; each plane is a clickable mesh with userData.imgIdx
function buildPhotoPlanes(camPositions, textures) {
  const group = new THREE.Group();
  const PHOTO_SCALE = 2.2; // width in world units (aspect ~4:3)

  camPositions.forEach(({ pos, target }, i) => {
    const tex = textures[i];
    if (!tex) return;

    // Orient plane to face from camera towards scene target
    const dir = new THREE.Vector3().subVectors(target, pos).normalize();
    const planePos = pos.clone().addScaledVector(dir, 0.3); // just in front of camera dot

    // Photo mesh
    const aspect = tex.image ? tex.image.width / tex.image.height : 4/3;
    const geo = new THREE.PlaneGeometry(PHOTO_SCALE, PHOTO_SCALE / aspect);
    const mat = new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide, transparent: true, opacity: 0.95 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.userData = { imgIdx: i, file: IMAGE_FILES[i] };

    // Position & orient
    mesh.position.copy(planePos);
    mesh.lookAt(planePos.clone().add(dir)); // face toward scene

    group.add(mesh);

    // White frame border (thin line box)
    const bGeo = new THREE.EdgesGeometry(geo);
    const bMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 });
    const border = new THREE.LineSegments(bGeo, bMat);
    border.position.copy(planePos);
    border.lookAt(planePos.clone().add(dir));
    group.add(border);
  });

  return group;
}

// ── Tracks ────────────────────────────────────────────
function buildTracks(camPositions) {
  const rng = mulberry32(99);
  const pts = [];
  for(let t=0;t<280;t++){
    const i=Math.floor(rng()*camPositions.length);
    const j=(i+1+Math.floor(rng()*2))%camPositions.length;
    const mid=new THREE.Vector3((rng()-.5)*8,rng()*5,(rng()-.5)*5);
    pts.push(camPositions[i].pos.clone(),mid.clone());
    pts.push(camPositions[j].pos.clone(),mid.clone());
  }
  return new THREE.LineSegments(
    new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({color:0x10b981,transparent:true,opacity:.18})
  );
}

// ── Filmstrip ────────────────────────────────────────
function buildFilmstrip(camPositions) {
  const strip = document.getElementById('filmstrip');
  camPositions.forEach(({ file, label }, i) => {
    const div = document.createElement('div');
    div.className = 'thumb';
    div.id = `thumb-${i}`;
    div.title = label;
    div.innerHTML = `<img src="${file}" alt="${label}" loading="lazy"/>`;
    div.addEventListener('click', () => openLightbox(i));
    strip.appendChild(div);
  });
}

// ── Lightbox ─────────────────────────────────────────
let lbIndex = 0;
let camPositionsGlobal = [];

window.openLightbox = function(i) {
  lbIndex = i;
  const cp = camPositionsGlobal[i];
  document.getElementById('lb-img').src = cp.file;
  document.getElementById('lightbox-label').textContent = `${cp.label}  ·  Camera ${i+1} / ${N_CAMS}`;
  document.getElementById('lightbox').classList.add('open');
  document.querySelectorAll('.thumb').forEach((el, j) => el.classList.toggle('active', j === i));
  // Fly camera toward this photo's frustum
  flyToCamera(cp);
};

window.closeLightbox = function() {
  document.getElementById('lightbox').classList.remove('open');
  document.querySelectorAll('.thumb').forEach(el => el.classList.remove('active'));
};

window.lbStep = function(delta) {
  openLightbox((lbIndex + delta + N_CAMS) % N_CAMS);
};

document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeLightbox();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowRight') lbStep(+1);
  if (e.key === 'ArrowLeft')  lbStep(-1);
});

// ── Fly to camera ─────────────────────────────────────
let flyTarget = null;
function flyToCamera({ pos, target }) {
  flyTarget = {
    camPos: pos.clone().addScaledVector(
      new THREE.Vector3().subVectors(pos, target).normalize(), 5
    ),
    lookAt: target.clone(),
  };
}

// ── Raycaster (click on photo planes) ────────────────
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let photoMeshes = [];

renderer.domElement.addEventListener('click', e => {
  if (document.getElementById('lightbox').classList.contains('open')) return;
  mouse.x =  (e.clientX / innerWidth)  * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(photoMeshes);
  if (hits.length > 0) {
    openLightbox(hits[0].object.userData.imgIdx);
  }
});

// ── Layer toggles ─────────────────────────────────────
const layerState = { cloud:true, cams:true, photos:true, tracks:true, ground:true };
let cloudObj, camGroup, photoGroup, trackObj, groundObj;

window.toggleLayer = function(key) {
  layerState[key] = !layerState[key];
  document.getElementById('btn-'+key).classList.toggle('active', layerState[key]);
  if (key==='cloud'  && cloudObj)   cloudObj.visible   = layerState[key];
  if (key==='cams'   && camGroup)   camGroup.visible   = layerState[key];
  if (key==='photos' && photoGroup) photoGroup.visible = layerState[key];
  if (key==='tracks' && trackObj)   trackObj.visible   = layerState[key];
  if (key==='ground' && groundObj)  groundObj.visible  = layerState[key];
};

// ── Load textures ─────────────────────────────────────
function loadTextures(files) {
  const loader = new THREE.TextureLoader();
  return Promise.all(files.map(f => new Promise(resolve => {
    loader.load(f, tex => { tex.colorSpace = THREE.SRGBColorSpace; resolve(tex); }, undefined, () => resolve(null));
  })));
}

// ── Load real COLMAP point cloud ───────────────────────
async function tryLoadRealCloud() {
  // Try fetching pointcloud.json produced by ply_to_json.py
  try {
    const res = await fetch('pointcloud.json');
    if (!res.ok) return null;
    const data = await res.json();
    if (!data.count || data.count === 0) return null;

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(data.positions, 3));
    geo.setAttribute('color',    new THREE.Float32BufferAttribute(data.colors,    3));

    // Centre the cloud at origin
    geo.computeBoundingBox();
    const centre = new THREE.Vector3();
    geo.boundingBox.getCenter(centre);
    const pos = geo.attributes.position.array;
    for (let i = 0; i < pos.length; i += 3) {
      pos[i]   -= centre.x;
      pos[i+1] -= centre.y;
      pos[i+2] -= centre.z;
    }
    geo.attributes.position.needsUpdate = true;

    const mat = new THREE.PointsMaterial({
      size: 0.04, vertexColors: true, sizeAttenuation: true,
      transparent: true, opacity: 0.95,
    });
    return { cloud: new THREE.Points(geo, mat), centre, real: true };
  } catch { return null; }
}

// Try loading real cameras from cameras.json (produced by colmap_to_json.py)
async function tryLoadRealCameras() {
  try {
    const res = await fetch('cameras.json');
    if (!res.ok) return null;
    const data = await res.json();
    if (!data.length) return null;
    return data.map((c, i) => ({
      pos:    new THREE.Vector3(...c.position),
      target: new THREE.Vector3(...c.target),
      file:   IMAGE_FILES[i] ?? IMAGE_FILES[0],
      label:  (IMAGE_FILES[i] ?? IMAGE_FILES[0]).split('/').pop(),
    }));
  } catch { return null; }
}

// ── Build scene ───────────────────────────────────────
async function build() {
  progress(5, 'Loading images…');
  const textures = await loadTextures(IMAGE_FILES);

  progress(20, 'Loading point cloud…'); await tick();
  const realCloudResult = await tryLoadRealCloud();

  if (realCloudResult) {
    cloudObj = realCloudResult.cloud;
    document.getElementById('title').querySelector('p').textContent =
      'COLMAP · Real Sparse Reconstruction · 11 images';
  } else {
    cloudObj = buildPointCloud();
  }
  scene.add(cloudObj);
  document.getElementById('s-pts').textContent =
    (cloudObj.geometry.attributes.position.count / 1000).toFixed(1) + 'k';

  progress(45, 'Placing cameras…'); await tick();
  const realCams = await tryLoadRealCameras();
  const camPositions = realCams ?? computeCameraPositions();
  camPositionsGlobal = camPositions;

  // If real cloud, scale camera positions to match
  if (realCloudResult && !realCams) {
    // Adjust procedural cameras to wrap around a unit-scale real cloud
    const box = new THREE.Box3().setFromObject(cloudObj);
    const size = box.getSize(new THREE.Vector3());
    const scale = Math.max(size.x, size.y, size.z);
    camPositions.forEach(cp => {
      cp.pos.multiplyScalar(scale / 20);
      cp.target.multiplyScalar(scale / 20);
    });
  }

  camGroup = buildCameraGroup(camPositions);
  scene.add(camGroup);
  document.getElementById('s-cams').textContent = camPositions.length;

  progress(65, 'Attaching photos…'); await tick();
  photoGroup = buildPhotoPlanes(camPositions, textures);
  scene.add(photoGroup);
  photoMeshes = photoGroup.children.filter(c => c.isMesh);

  progress(75, 'Drawing tracks…'); await tick();
  trackObj = buildTracks(camPositions);
  scene.add(trackObj);
  document.getElementById('s-tracks').textContent = realCloudResult
    ? (cloudObj.geometry.attributes.position.count).toLocaleString()
    : '280';

  progress(88, 'Building filmstrip…'); await tick();
  buildFilmstrip(camPositions);

  groundObj = new THREE.GridHelper(60, 40, 0x1a2540, 0x111827);
  groundObj.position.y = -0.01;
  scene.add(groundObj);

  progress(100, 'Done'); await tick();
  const ld = document.getElementById('loading');
  ld.style.opacity = '0';
  setTimeout(() => ld.style.display = 'none', 800);
}

// ── Animation loop ─────────────────────────────────────
let autoOrbit = false;
let lastTime = performance.now();
let frameCount = 0, fpsTime = 0;

document.addEventListener('keydown', e => {
  if (e.key==='r'||e.key==='R') { camera.position.set(18,12,22); controls.target.set(0,1.5,0); controls.update(); flyTarget=null; }
  if (e.key==='a'||e.key==='A') autoOrbit = !autoOrbit;
});

function animate(now) {
  requestAnimationFrame(animate);
  const dt = (now - lastTime) / 1000;
  lastTime = now;

  frameCount++; fpsTime += dt;
  if (fpsTime > 0.5) {
    document.getElementById('s-fps').textContent = Math.round(frameCount/fpsTime);
    frameCount = 0; fpsTime = 0;
  }

  // Smooth fly-to
  if (flyTarget) {
    camera.position.lerp(flyTarget.camPos, 0.04);
    controls.target.lerp(flyTarget.lookAt, 0.04);
    if (camera.position.distanceTo(flyTarget.camPos) < 0.15) flyTarget = null;
  }

  controls.autoRotate = autoOrbit && !flyTarget;
  controls.autoRotateSpeed = 0.4;

  if (cloudObj) cloudObj.material.size = 0.065 + Math.sin(now*0.0008)*0.012;

  controls.update();
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

build().then(() => animate(performance.now()));
</script>
